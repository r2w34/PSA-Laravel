<!DOCTYPE html>
<html>
<head>
    <title>Database Seeding Tool</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .button { padding: 10px 20px; margin: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .button:hover { background: #0056b3; }
        .log { background: #f8f9fa; border: 1px solid #dee2e6; padding: 15px; margin: 10px 0; border-radius: 5px; white-space: pre-wrap; font-family: monospace; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌱 PSA Nashik Database Seeding Tool</h1>
        <p>This tool will populate the database with sample data for testing the search functionality.</p>
        
        <button class="button" onclick="seedDatabase()">🌱 Seed Database</button>
        <button class="button" onclick="testSearch()">🔍 Test Search</button>
        <button class="button" onclick="clearLog()">🧹 Clear Log</button>
        
        <div id="log" class="log">Ready to seed database...\n</div>
    </div>

    <script>
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : 'info';
            logDiv.innerHTML += `<span class="${className}">[${timestamp}] ${message}</span>\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = 'Log cleared...\n';
        }

        async function seedDatabase() {
            log('🌱 Starting database seeding...', 'info');
            
            try {
                const response = await fetch('/api/seed-database', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include'
                });

                if (response.ok) {
                    const result = await response.json();
                    log('✅ Database seeding completed successfully!', 'success');
                    log(`📊 Result: ${JSON.stringify(result, null, 2)}`, 'success');
                } else {
                    const error = await response.text();
                    log(`❌ Seeding failed: ${response.status} - ${error}`, 'error');
                }
            } catch (error) {
                log(`❌ Error during seeding: ${error.message}`, 'error');
            }
        }

        async function testSearch() {
            log('🔍 Testing search functionality...', 'info');
            
            try {
                // Test search for "test"
                const response = await fetch('/api/students?search=test&limit=10', {
                    credentials: 'include'
                });

                if (response.ok) {
                    const result = await response.json();
                    log(`✅ Search test completed!`, 'success');
                    log(`📊 Students found: ${result.students?.length || 0}`, 'success');
                    log(`📊 Total in DB: ${result.total || 0}`, 'success');
                    
                    if (result.students && result.students.length > 0) {
                        log(`👥 Found students:`, 'success');
                        result.students.forEach(student => {
                            log(`  - ${student.name} (${student.studentId})`, 'success');
                        });
                    } else {
                        log(`⚠️ No students found matching "test"`, 'info');
                    }
                } else {
                    const error = await response.text();
                    log(`❌ Search test failed: ${response.status} - ${error}`, 'error');
                }
            } catch (error) {
                log(`❌ Error during search test: ${error.message}`, 'error');
            }
        }

        // Auto-run seeding on page load
        window.addEventListener('load', () => {
            log('🚀 Page loaded. Ready to seed database.', 'info');
            log('💡 Click "Seed Database" to populate with sample data.', 'info');
        });
    </script>
</body>
</html>
