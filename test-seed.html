<!DOCTYPE html>
<html>
<head>
    <title>Database Seeding Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        button { padding: 10px 20px; margin: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .log { background: #f8f9fa; border: 1px solid #dee2e6; padding: 15px; margin: 10px 0; border-radius: 5px; font-family: monospace; white-space: pre-wrap; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>PSA Nashik Database Seeding Test</h1>
    
    <button onclick="seedDatabase()">🌱 Seed Database</button>
    <button onclick="testStudentSearch()">🔍 Test Student Search</button>
    <button onclick="clearLog()">🗑️ Clear Log</button>
    
    <div id="log" class="log">Ready to test database seeding...\n</div>

    <script>
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'success' ? 'success' : type === 'error' ? 'error' : '';
            logDiv.innerHTML += `<span class="${className}">[${timestamp}] ${message}</span>\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = 'Log cleared...\n';
        }

        async function seedDatabase() {
            log('🌱 Starting database seeding...');
            
            try {
                const response = await fetch('/api/seed-database', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const result = await response.json();
                
                if (response.ok && result.success) {
                    log('✅ Database seeding completed successfully!', 'success');
                    log(`📊 Summary: ${result.summary.sports} sports, ${result.summary.batches} batches, ${result.summary.studentsAdded} students added`, 'success');
                    log(`👥 Total students in database: ${result.summary.totalStudents}`, 'success');
                } else {
                    log(`❌ Seeding failed: ${result.message || 'Unknown error'}`, 'error');
                    if (result.error) {
                        log(`Error details: ${result.error}`, 'error');
                    }
                }
            } catch (error) {
                log(`❌ Network error: ${error.message}`, 'error');
                log('Make sure the server is running and the seeding endpoint is available', 'error');
            }
        }

        async function testStudentSearch() {
            log('🔍 Testing student search...');
            
            try {
                const response = await fetch('/api/students?search=test&limit=10');
                const result = await response.json();
                
                if (response.ok) {
                    log(`✅ Search test completed. Found ${result.total || result.students?.length || 0} students`, 'success');
                    if (result.students && result.students.length > 0) {
                        log(`Sample students: ${result.students.slice(0, 3).map(s => s.name).join(', ')}`, 'success');
                    } else {
                        log('No students found in search results', 'error');
                    }
                } else {
                    log(`❌ Search test failed: ${result.message || 'Unknown error'}`, 'error');
                }
            } catch (error) {
                log(`❌ Search test error: ${error.message}`, 'error');
            }
        }

        // Auto-run on page load
        window.addEventListener('load', () => {
            log('🚀 Database seeding test page loaded');
            log('Click "Seed Database" to populate with sample data');
        });
    </script>
</body>
</html>
